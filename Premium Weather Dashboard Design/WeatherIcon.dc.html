<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;width:{{ size }}px;height:{{ size }}px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
  <sc-if value="{{ isSunny }}">
    <div style="position:absolute;width:58%;height:58%;border-radius:50%;background:radial-gradient(circle at 35% 32%, #FFE29A, #FFA53D 70%);box-shadow:0 0 26% rgba(255,165,61,0.55);"></div>
  </sc-if>
  <sc-if value="{{ isCloudy }}">
    <div style="position:absolute;top:14%;left:16%;width:34%;height:34%;border-radius:50%;background:radial-gradient(circle at 35% 32%, #FFE29A, #FFB454 70%);opacity:0.9;"></div>
    <div style="position:absolute;bottom:16%;left:8%;width:60%;height:34%;border-radius:999px;background:#EDEFF4;box-shadow:0 4px 10px rgba(20,30,50,0.12);"></div>
    <div style="position:absolute;bottom:22%;left:34%;width:52%;height:40%;border-radius:999px;background:#FAFBFD;box-shadow:0 4px 10px rgba(20,30,50,0.10);"></div>
  </sc-if>
  <sc-if value="{{ isRain }}">
    <div style="position:absolute;top:14%;left:20%;width:60%;height:38%;border-radius:999px;background:#B9C2D0;"></div>
    <div style="position:absolute;top:56%;left:28%;width:6%;height:22%;border-radius:999px;background:#6FA8E8;transform:rotate(18deg);"></div>
    <div style="position:absolute;top:56%;left:46%;width:6%;height:26%;border-radius:999px;background:#6FA8E8;transform:rotate(18deg);"></div>
    <div style="position:absolute;top:56%;left:64%;width:6%;height:20%;border-radius:999px;background:#6FA8E8;transform:rotate(18deg);"></div>
  </sc-if>
  <sc-if value="{{ isSnow }}">
    <div style="position:absolute;top:14%;left:20%;width:60%;height:38%;border-radius:999px;background:#DCE3EE;"></div>
    <div style="position:absolute;top:60%;left:30%;width:9%;height:9%;border-radius:50%;background:#EAF2FF;"></div>
    <div style="position:absolute;top:68%;left:48%;width:9%;height:9%;border-radius:50%;background:#EAF2FF;"></div>
    <div style="position:absolute;top:60%;left:64%;width:9%;height:9%;border-radius:50%;background:#EAF2FF;"></div>
  </sc-if>
  <sc-if value="{{ isStorm }}">
    <div style="position:absolute;top:10%;left:18%;width:64%;height:36%;border-radius:999px;background:#7A8598;"></div>
    <div style="position:absolute;top:44%;left:42%;width:26%;height:46%;background:#FFD24A;clip-path:polygon(60% 0%, 10% 55%, 45% 55%, 30% 100%, 90% 40%, 55% 40%);"></div>
  </sc-if>
  <sc-if value="{{ isFog }}">
    <div style="position:absolute;top:28%;left:12%;width:76%;height:12%;border-radius:999px;background:#C7CEDA;opacity:0.9;"></div>
    <div style="position:absolute;top:48%;left:20%;width:60%;height:12%;border-radius:999px;background:#C7CEDA;opacity:0.7;"></div>
    <div style="position:absolute;top:68%;left:10%;width:70%;height:12%;border-radius:999px;background:#C7CEDA;opacity:0.5;"></div>
  </sc-if>
  <sc-if value="{{ isNight }}">
    <div style="position:absolute;width:50%;height:50%;border-radius:50%;background:radial-gradient(circle at 40% 35%, #E8ECF6, #B9C3DC 75%);box-shadow:0 0 20% rgba(180,195,230,0.5);"></div>
    <div style="position:absolute;top:16%;right:14%;width:6%;height:6%;border-radius:50%;background:#E8ECF6;"></div>
    <div style="position:absolute;bottom:20%;right:22%;width:5%;height:5%;border-radius:50%;background:#E8ECF6;opacity:0.7;"></div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:64,&quot;height&quot;:64},&quot;condition&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;sunny&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;sunny&quot;,&quot;cloudy&quot;,&quot;rain&quot;,&quot;snow&quot;,&quot;storm&quot;,&quot;fog&quot;,&quot;night&quot;]},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:48,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:16,&quot;max&quot;:160}}">
class Component extends DCLogic {
  renderVals() {
    const c = (this.props.condition || 'sunny').toLowerCase();
    return {
      size: this.props.size || 48,
      isSunny: c === 'sunny',
      isCloudy: c === 'cloudy',
      isRain: c === 'rain',
      isSnow: c === 'snow',
      isStorm: c === 'storm',
      isFog: c === 'fog',
      isNight: c === 'night',
    };
  }
}
</script>
</body>
</html>
